repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: "v4.6.0"
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-case-conflict
  - id: check-merge-conflict
  - id: check-yaml
  - id: check-toml
  - id: check-added-large-files
  - id: mixed-line-ending
  - id: forbid-submodules
  - id: check-xml
- repo: https://github.com/editorconfig-checker/editorconfig-checker.python
  rev: "2.7.3"
  hooks:
  - id: editorconfig-checker
    exclude: "(.github|.idea)/.*"
- repo: https://github.com/pre-commit/mirrors-prettier
  rev: v3.1.0
  hooks:
  - id: prettier
    exclude_types:
    - yaml
- repo: local
  hooks:
  - id: cargo-version-update
    name: Check Cargo Versions
    language: system
    entry: cargo update -w
    pass_filenames: false
    files: "Cargo\\.(lock|toml)"
  # cargo-clippy runs via the system cargo rather than the andrewaylett Docker
  # image, because that image lacks cmake and C++ required by the sdl2 bundled
  # feature. The CI check job runs clippy separately with SARIF upload.
  - id: cargo-clippy
    name: Cargo Clippy
    language: system
    entry: cargo clippy
    pass_filenames: false
    types: [rust]
- repo: https://github.com/andrewaylett/pre-commit-hooks
  rev: v0.7.2
  hooks:
  - id: init-hooks
  - id: cargo-fmt
- repo: https://github.com/google/yamlfmt
  rev: v0.21.0
  hooks:
  - id: yamlfmt
- repo: https://github.com/rhysd/actionlint
  rev: v1.7.12
  hooks:
  - id: actionlint
- repo: https://github.com/python-jsonschema/check-jsonschema
  rev: 0.33.3
  hooks:
  - id: check-github-workflows
  - id: check-renovate
- repo: https://github.com/renovatebot/pre-commit-hooks
  rev: 41.81.5
  hooks:
  - id: renovate-config-validator
    args:
    - --strict
ci:
  skip:
  - cargo-clippy
